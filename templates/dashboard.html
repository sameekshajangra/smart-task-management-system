<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Smart Task Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <nav class="glass" style="border-radius: 0; margin-bottom: 2rem;">
        <div class="logo">TaskMaster</div>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <span>Welcome, {{ current_user.username }}</span>
            <a href="{{ url_for('auth.logout') }}" style="color: var(--danger); text-decoration: none; font-weight: 600;">Logout</a>
        </div>
    </nav>

    <div class="container">
        <!-- Analytics Section -->
        <div class="analytics-grid" id="analytics-container">
            <div class="glass stat-card">
                <div class="stat-value" id="total-tasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="glass stat-card">
                <div class="stat-value" id="completed-tasks" style="color: var(--success);">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="glass stat-card">
                <div class="stat-value" id="pending-tasks" style="color: var(--pending);">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="glass stat-card">
                <div class="stat-value" id="completion-rate">0%</div>
                <div class="stat-label">Completion</div>
            </div>
        </div>

        <!-- Task Controls -->
        <div class="task-controls">
            <h2>Your Tasks</h2>
            <button onclick="openModal()">+ Add New Task</button>
        </div>

        <!-- Task Grid -->
        <div class="task-grid" id="task-list">
            <!-- Tasks will be injected here via JS -->
        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal" id="taskModal">
        <div class="glass modal-content">
            <h2 style="margin-bottom: 1.5rem;">Add New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="taskTitle" required placeholder="What needs to be done?">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="taskDesc" rows="3" placeholder="Add more details..."></textarea>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="taskPriority">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" style="flex: 1;">Create Task</button>
                    <button type="button" onclick="closeModal()" style="flex: 1; background: transparent; border: 1px solid var(--border);">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const userId = {{ current_user.id }};
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
